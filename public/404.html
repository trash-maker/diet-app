<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>La mia dieta</title>
    <script>
      // SPA redirect: encode the current path into the query string so index.html can restore it.
      // pathSegmentsToKeep=1 preserves the repo name segment (/diet-app/).
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
